<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AIツール企画書</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #3F51B5;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #3F51B5;
      --sidebar-nav-link-font-weight--active: 700;
    }
    .sidebar-nav > ul > li > a { font-weight: 700; font-size: 0.95em; }
    .markdown-section h1 { border-bottom: 2px solid #3F51B5; padding-bottom: 0.3em; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AIツール企画書',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: '検索...',
        noData: '見つかりませんでした',
        paths: 'auto'
      },
      coverpage: false,
      notFoundPage: true,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
